<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="description" content="Halem Farm - ระบบสั่งซื้อผักออร์แกนิคออนไลน์">
  <meta name="keywords" content="ผักออร์แกนิค, ฟาร์ม, สั่งซื้อออนไลน์, ผักสด">
  <meta name="author" content="Halem Farm">

  <title>Halem Farm - ระบบสั่งซื้อผักออร์แกนิค</title>
  <link rel="icon" href="logo.png" type="image/png">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="toast-success" class="hidden fixed inset-0 flex items-center justify-center z-50">
    <div class="bg-white shadow-lg rounded-lg p-6 flex flex-col items-center border border-green-500 animate-fade-in-out">
      <svg class="w-16 h-16 text-green-600 mb-4" fill="none" stroke="currentColor" stroke-width="2"
           viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M5 13l4 4L19 7"/>
      </svg>
      <p class="text-green-700 font-semibold text-lg text-center">
        สั่งซื้อสำเร็จ<br/>ทางฟาร์มได้รับคำสั่งซื้อเรียบร้อยแล้ว
      </p>
    </div>
  </div>

  <div id="toast-error" class="hidden fixed inset-0 flex items-center justify-center z-50">
    <div class="bg-white shadow-lg rounded-lg p-6 flex flex-col items-center border border-red-500 animate-fade-in-out">
      <svg class="w-16 h-16 text-red-600 mb-4" fill="none" stroke="currentColor" stroke-width="2"
           viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M5 13l4 4L19 7"/>
      </svg>
      <p class="text-red-700 font-semibold text-lg text-center">
        เกิดข้อผิดพลาด<br/>กรุณาติดต่อผู้ดูแลระบบ ขออภัยในความไม่สะดวกครับ 🙏
      </p>
    </div>
  </div>
  
  <style>
    @keyframes fadeInOut {
      0% { opacity: 0; transform: scale(0.9); }
      10%, 90% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(0.9); }
    }
  
    .animate-fade-in-out {
      animation: fadeInOut 2s ease-in-out forwards;
    }
  </style>
  <!-- Main Application Container -->
  <main class="min-h-screen">
    <div id="form-container" class="flex items-center justify-center py-8">
      <div class="animate-pulse text-gray-500">กำลังโหลดระบบ...</div>
    </div>
  </main>

  <!-- Scripts -->
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="config.js?v=2"></script>
  <script src="script.js?v=2"></script>
</body>
</html>
